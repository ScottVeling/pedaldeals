name: Update deals

on:
  schedule:
    # Runs every day at 7:00 and 18:00 UTC
    - cron: '0 7,18 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run deal bot
        run: python bot/dealbot.py

      - name: Commit and push if changed
        run: |
          git config user.name "dealbot"
          git config user.email "bot@pedaldeals"
          git add js/deals.js bot/price_history.json
          git diff --staged --quiet || git commit -m "update deals $(date +%Y-%m-%d)"
          git push
